<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141714;
    --border: #1e221e;
    --border-bright: #2a302a;
    --text: #e8ede8;
    --muted: #5a635a;
    --accent: #b8ff57;
    --accent-dim: #8ab83e;
    --gain: #b8ff57;
    --loss: #ff6b57;
    --loss-dim: #c45242;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-mono: 'DM Mono', 'Courier New', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 24px;
    background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(184,255,87,0.06) 0%, transparent 70%);
  }

  header {
    text-align: center;
    margin-bottom: 56px;
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 400;
    line-height: 1.1;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  h1 em { font-style: italic; color: var(--accent); }

  .subtitle {
    margin-top: 14px;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .card {
    width: 100%;
    max-width: 580px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 40px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 4px;
    background: linear-gradient(135deg, rgba(184,255,87,0.12), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .card > * { position: relative; z-index: 1; }

  .field {
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 1.05rem;
    font-weight: 400;
    padding: 13px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(184,255,87,0.08);
  }

  input::placeholder { color: var(--muted); opacity: 0.6; }
  input[type="text"] { text-transform: uppercase; }

  /* Autocomplete */
  .autocomplete-wrap {
    position: relative;
  }

  .autocomplete-wrap input {
    text-transform: uppercase;
  }

  #tickerDropdown {
    display: none;
    position: fixed;
    background: #1a1f1a;
    border: 1px solid var(--border-bright);
    border-radius: 3px;
    z-index: 9999;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    max-height: 280px;
    overflow-y: auto;
  }

  .dropdown-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 16px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid var(--border);
  }

  .dropdown-item:last-child { border-bottom: none; }

  .dropdown-item:hover,
  .dropdown-item.active {
    background: rgba(184,255,87,0.07);
  }

  .dropdown-symbol {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.05em;
    min-width: 60px;
  }

  .dropdown-name {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.02em;
    flex: 1;
    padding: 0 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-transform: none;
  }

  .dropdown-type {
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0.6;
    flex-shrink: 0;
  }

  .dropdown-searching {
    padding: 12px 16px;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  button {
    width: 100%;
    background: var(--accent);
    color: #0a0c0a;
    border: none;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 16px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 8px;
  }

  button:hover { background: #c9ff6e; }
  button:active { transform: scale(0.99); }
  button:disabled { background: var(--border-bright); color: var(--muted); cursor: not-allowed; }

  /* Result panel */
  #result {
    width: 100%;
    max-width: 580px;
    margin-top: 16px;
    display: none;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px 40px;
    position: relative;
    overflow: hidden;
  }

  .result-card.gain { border-color: rgba(184,255,87,0.25); }
  .result-card.loss { border-color: rgba(255,107,87,0.25); }

  .result-card.gain::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top left, rgba(184,255,87,0.05), transparent 60%);
    pointer-events: none;
  }

  .result-card.loss::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top left, rgba(255,107,87,0.05), transparent 60%);
    pointer-events: none;
  }

  .ticker-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .ticker-badge {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .date-range {
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  /* Value display: two big numbers side by side */
  .value-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    margin-bottom: 32px;
    position: relative;
  }

  .value-pair::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 10%;
    height: 80%;
    width: 1px;
    background: var(--border-bright);
  }

  .value-block { padding-right: 24px; }
  .value-block:last-child { padding-right: 0; padding-left: 24px; }

  .value-label {
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .big-number {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .big-number.gain { color: var(--gain); }
  .big-number.loss { color: var(--loss); }

  .big-number-sub {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  .big-number-sub.gain { color: var(--accent-dim); }
  .big-number-sub.loss { color: var(--loss-dim); }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .stat {
    background: var(--bg);
    padding: 16px 18px;
  }

  .stat-label {
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
  }

  .stat-value.gain { color: var(--gain); }
  .stat-value.loss { color: var(--loss); }

  /* Error / status */
  #status {
    width: 100%;
    max-width: 580px;
    margin-top: 16px;
    display: none;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    color: var(--loss);
    padding: 16px 20px;
    background: rgba(255,107,87,0.06);
    border: 1px solid rgba(255,107,87,0.2);
    border-radius: 3px;
  }

  .loading-text {
    color: var(--muted);
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-align: center;
    padding: 20px 0;
    display: none;
  }

  footer {
    margin-top: 48px;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-align: center;
    opacity: 0.5;
  }

  @media (max-width: 480px) {
    .card, .result-card { padding: 28px 24px; }
    .row { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr; }
    .ticker-row { flex-direction: column; align-items: flex-start; gap: 4px; }
    .value-pair { grid-template-columns: 1fr; gap: 20px; }
    .value-pair::after { display: none; }
    .value-block, .value-block:last-child { padding: 0; }
  }
</style>
</head>

// --- Formatting ---
function fmt(n) {
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(dateStr) {
  const [y, m, d] = dateStr.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
}

// --- Status / loading ---
function setStatus(msg) {

function setLoading(on) {
  document.getElementById('loadingText').style.display = on ? 'block' : 'none';

function onTickerInput(val) {
  const q = val.trim().toUpperCase();
  if (q.length < 2) { hideDropdown(); return; }

  const matches = TICKERS.filter(t =>
    t.s.startsWith(q) || t.n.toUpperCase().includes(q)
  ).slice(0, 8);

  positionDropdown();
  const dropdown = document.getElementById('tickerDropdown');
  dropdownItems = matches;
  activeIndex = -1;

  if (matches.length === 0) {
    dropdown.innerHTML = '<div class="dropdown-searching">No matches &mdash; type the full ticker symbol</div>';
    dropdown.style.display = 'block';
    return;
  }

  dropdown.innerHTML = matches.map((m, i) => `
    <div class="dropdown-item" data-index="${i}" onmousedown="selectTicker(${i})">
      <span class="dropdown-symbol">${m.s}</span>
      <span class="dropdown-name">${m.n}</span>
      <span class="dropdown-type">${m.t}</span>
    </div>
  `).join('');
  dropdown.style.display = 'block';
}

function positionDropdown() {
  const input = document.getElementById('ticker');
  const rect = input.getBoundingClientRect();
  const dropdown = document.getElementById('tickerDropdown');
  dropdown.style.top = (rect.bottom + 4) + 'px';
  dropdown.style.left = rect.left + 'px';
  dropdown.style.width = rect.width + 'px';
}

function selectTicker(index) {
  const item = dropdownItems[index];
  if (!item) return;
  const input = document.getElementById('ticker');
  input.value = item.s;
  hideDropdown();
  document.getElementById('startDate').focus();
}

function hideDropdown() {
  const dropdown = document.getElementById('tickerDropdown');
  dropdown.style.display = 'none';
  dropdownItems = [];
  activeIndex = -1;
}

function hideDropdownDelayed() {
  // Delay so mousedown on item fires first
  setTimeout(hideDropdown, 200);
}

function onTickerKeydown(e) {
  const dropdown = document.getElementById('tickerDropdown');
  if (dropdown.style.display === 'none') return;

  const items = dropdown.querySelectorAll('.dropdown-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeIndex = Math.min(activeIndex + 1, items.length - 1);
    updateActiveItem(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeIndex = Math.max(activeIndex - 1, -1);
    updateActiveItem(items);
  } else if (e.key === 'Enter') {
    if (activeIndex >= 0 && activeIndex < dropdownItems.length) {
      e.preventDefault();
      selectTicker(activeIndex);
    } else {
      hideDropdown();
      calculate();
    }
  } else if (e.key === 'Escape') {
    hideDropdown();
  }
}

function updateActiveItem(items) {
  items.forEach((el, i) => {
    el.classList.toggle('active', i === activeIndex);
  });
}

// --- Price fetching ---
async function fetchMonthlyPrices(ticker) {
  const url = `https://www.alphavantage.co/query?function=TIME_SERIES_MONTHLY_ADJUSTED&symbol=${ticker}&apikey=${API_KEY}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('Network error fetching price data.');
  const data = await resp.json();
  if (data['Information']) throw new Error('API rate limit reached. Alpha Vantage free tier allows 25 requests/day. Please wait a moment.');
  if (data['Error Message']) throw new Error(`Symbol "${ticker}" not found. Check the ticker and try again.`);
  if (!data['Monthly Adjusted Time Series']) throw new Error('Unexpected API response. The symbol may be invalid.');
  return data['Monthly Adjusted Time Series'];
}

async function fetchDailyPrices(ticker) {
  const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY_ADJUSTED&symbol=${ticker}&outputsize=compact&apikey=${API_KEY}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('Network error.');
  const data = await resp.json();
  if (data['Information']) throw new Error('API rate limit reached.');
  if (!data['Time Series (Daily)']) return null;
  return data['Time Series (Daily)'];
}

function getMostRecentDate(series) {
  return Object.keys(series).sort().pop();
}

// --- Main calculation ---
async function calculate() {
  const ticker = document.getElementById('ticker').value.trim().toUpperCase();
  const startDate = document.getElementById('startDate').value;
  const amount = parseFloat(document.getElementById('amount').value);

  document.getElementById('result').style.display = 'none';
  setStatus('');

  if (!ticker) { setStatus('Please enter a ticker symbol.'); return; }
  if (!startDate) { setStatus('Please select a start date.'); return; }
  if (!amount || amount <= 0) { setStatus('Please enter a valid investment amount.'); return; }

  const today = new Date().toISOString().split('T')[0];
  if (startDate >= today) { setStatus('Start date must be in the past.'); return; }

  const minDate = new Date();
  minDate.setFullYear(minDate.getFullYear() - 20);
  if (startDate < minDate.toISOString().split('T')[0]) {
    setStatus('Date range too far back. Alpha Vantage free tier returns up to 20 years of monthly data.');
    return;
  }

  setLoading(true);

  try {
    const monthly = await fetchMonthlyPrices(ticker);
    const monthDates = Object.keys(monthly).sort();

    let startKey = null;
    for (const d of monthDates) {
      if (d >= startDate) { startKey = d; break; }
    }
    if (!startKey) throw new Error('No price data available for or after your start date. The stock may not have existed then.');

    const endKey = getMostRecentDate(monthly);
    const buyPrice = parseFloat(monthly[startKey]['4. close']);
    const currentPrice = parseFloat(monthly[endKey]['4. close']);
    if (!buyPrice || !currentPrice) throw new Error('Price data unavailable for this symbol.');

    let preciseCurrent = currentPrice;
    let preciseCurrentDate = endKey;
    try {
      const daily = await fetchDailyPrices(ticker);
      if (daily) {
        preciseCurrentDate = getMostRecentDate(daily);
        preciseCurrent = parseFloat(daily[preciseCurrentDate]['4. close']);
      }
    } catch (e) { /* fall back to monthly */ }

    const shares = amount / buyPrice;
    const currentValue = shares * preciseCurrent;
    const gainLoss = currentValue - amount;
    const pct = ((currentValue - amount) / amount) * 100;
    const isGain = gainLoss >= 0;

    const ms = new Date(preciseCurrentDate) - new Date(startKey);
    const years = ms / (1000 * 60 * 60 * 24 * 365.25);
    const cagr = years > 0 ? (Math.pow(currentValue / amount, 1 / years) - 1) * 100 : 0;

    const sign = isGain ? '+' : '';
    const cls = isGain ? 'gain' : 'loss';

    document.getElementById('result').innerHTML = `
      <div class="result-card ${cls}">
        <div class="ticker-row">
          <span class="ticker-badge">${ticker}</span>
          <span class="date-range">${fmtDate(startKey)} &rarr; ${fmtDate(preciseCurrentDate)}</span>
        </div>

        <div class="value-pair">
          <div class="value-block">
            <div class="value-label">Present Value</div>
            <div class="big-number">$${fmt(currentValue)}</div>
            <div class="big-number-sub">from $${fmt(amount)} invested</div>
          </div>
          <div class="value-block">
            <div class="value-label">Total Return</div>
            <div class="big-number ${cls}">${sign}$${fmt(Math.abs(gainLoss))}</div>
            <div class="big-number-sub ${cls}">${sign}${fmt(Math.abs(pct))}%</div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat">
            <div class="stat-label">Ann. Return</div>
            <div class="stat-value ${cls}">${sign}${fmt(Math.abs(cagr))}%</div>
          </div>
          <div class="stat">
            <div class="stat-label">Buy Price</div>
            <div class="stat-value">$${fmt(buyPrice)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Current Price</div>
            <div class="stat-value">$${fmt(preciseCurrent)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Shares</div>
            <div class="stat-value">${fmt(shares)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Years Held</div>
            <div class="stat-value">${years.toFixed(1)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Multiplier</div>
            <div class="stat-value">${(currentValue / amount).toFixed(2)}x</div>
          </div>
        </div>
      </div>
    `;
    document.getElementById('result').style.display = 'block';

  } catch (err) {
    setStatus(err.message || 'Something went wrong. Please try again.');
  } finally {
    setLoading(false);
  }
}

// Reposition dropdown on scroll or resize
window.addEventListener('scroll', () => {
  if (document.getElementById('tickerDropdown').style.display !== 'none') positionDropdown();
}, true);
window.addEventListener('resize', () => {
  if (document.getElementById('tickerDropdown').style.display !== 'none') positionDropdown();
});

// Enter key on non-ticker fields
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.id !== 'ticker') calculate();
});

// Default date: 5 years ago
const d = new Date();
d.setFullYear(d.getFullYear() - 5);
document.getElementById('startDate').value = d.toISOString().split('T')[0];
document.getElementById('startDate').max = new Date().toISOString().split('T')[0];
</script>
</body>
