<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141714;
    --border: #1e221e;
    --border-bright: #2a302a;
    --text: #e8ede8;
    --muted: #5a635a;
    --accent: #b8ff57;
    --accent-dim: #8ab83e;
    --gain: #b8ff57;
    --loss: #ff6b57;
    --loss-dim: #c45242;
    --color-a: #b8ff57;
    --color-b: #57c8ff;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-mono: 'DM Mono', 'Courier New', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 24px 80px;
    background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(184,255,87,0.06) 0%, transparent 70%);
  }

  header { text-align: center; margin-bottom: 56px; }

  .eyebrow {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }

  h1 em { font-style: italic; color: var(--accent); }

  .subtitle {
    margin-top: 14px;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .card {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 40px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 4px;
    background: linear-gradient(135deg, rgba(184,255,87,0.12), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .card > * { position: relative; z-index: 1; }

  .field { margin-bottom: 24px; }

  label {
    display: block;
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 1.05rem;
    padding: 13px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(184,255,87,0.08); }
  input::placeholder { color: var(--muted); opacity: 0.6; }

  .ticker-a label { color: var(--color-a); opacity: 0.9; }
  .ticker-b label { color: var(--color-b); opacity: 0.9; }
  .ticker-a input:focus { border-color: var(--color-a); box-shadow: 0 0 0 3px rgba(184,255,87,0.08); }
  .ticker-b input:focus { border-color: var(--color-b); box-shadow: 0 0 0 3px rgba(87,200,255,0.08); }

  .ticker-row-inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-bright);
  }

  .bottom-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 8px;
  }

  .autocomplete-wrap { position: relative; }
  .autocomplete-wrap input { text-transform: uppercase; }

  .ticker-dropdown {
    display: none;
    position: fixed;
    background: #1a1f1a;
    border: 1px solid var(--border-bright);
    border-radius: 3px;
    z-index: 9999;
    overflow-y: auto;
    max-height: 260px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7);
  }

  .dropdown-item {
    display: flex;
    align-items: center;
    padding: 11px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover, .dropdown-item.active { background: rgba(184,255,87,0.07); }

  .dropdown-symbol { font-size: 0.9rem; font-weight: 500; color: var(--text); letter-spacing: 0.05em; min-width: 64px; }
  .dropdown-name { font-size: 0.72rem; color: var(--muted); flex: 1; padding: 0 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: none; letter-spacing: 0.02em; }
  .dropdown-type { font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); opacity: 0.5; flex-shrink: 0; }
  .dropdown-msg { padding: 12px 16px; font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; }

  button {
    width: 100%;
    background: var(--accent);
    color: #0a0c0a;
    border: none;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 16px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 8px;
  }

  button:hover { background: #c9ff6e; }
  button:active { transform: scale(0.99); }
  button:disabled { background: var(--border-bright); color: var(--muted); cursor: not-allowed; }

  #status {
    width: 100%;
    max-width: 680px;
    margin-top: 16px;
    display: none;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    color: var(--loss);
    padding: 16px 20px;
    background: rgba(255,107,87,0.06);
    border: 1px solid rgba(255,107,87,0.2);
    border-radius: 3px;
  }

  .loading-text {
    display: none;
    color: var(--muted);
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-align: center;
    padding: 20px 0;
  }

  #result { width: 100%; max-width: 680px; margin-top: 16px; display: none; }

  /* ── Result cards ── */
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px 24px 24px;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .result-card.card-a { border-color: rgba(184,255,87,0.2); }
  .result-card.card-a::before { background: radial-gradient(ellipse at top left, rgba(184,255,87,0.04), transparent 60%); }
  .result-card.card-b { border-color: rgba(87,200,255,0.2); }
  .result-card.card-b::before { background: radial-gradient(ellipse at top left, rgba(87,200,255,0.04), transparent 60%); }

  .winner-badge {
    display: inline-block;
    font-size: 0.55rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    background: rgba(184,255,87,0.1);
    color: var(--accent);
    border: 1px solid rgba(184,255,87,0.22);
    border-radius: 2px;
    padding: 3px 8px;
    margin-bottom: 10px;
  }

  .rc-ticker { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 3px; }
  .card-a .rc-ticker { color: var(--color-a); }
  .card-b .rc-ticker { color: var(--color-b); }

  .rc-dates { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 18px; }

  .rc-present {
    font-family: var(--font-display);
    font-size: clamp(1.5rem, 3vw, 2rem);
    line-height: 1;
    color: var(--text);
    margin-bottom: 4px;
  }

  .rc-invested { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.04em; margin-bottom: 14px; }

  .rc-return {
    font-family: var(--font-display);
    font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    line-height: 1;
    margin-bottom: 3px;
  }

  .rc-return.gain { color: var(--gain); }
  .rc-return.loss { color: var(--loss); }

  .rc-pct { font-size: 0.7rem; letter-spacing: 0.04em; margin-bottom: 18px; }
  .rc-pct.gain { color: var(--accent-dim); }
  .rc-pct.loss { color: var(--loss-dim); }

  .mini-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .mini-stat { background: var(--bg); padding: 10px 12px; }
  .mini-stat-label { font-size: 0.54rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .mini-stat-value { font-size: 0.85rem; font-weight: 500; color: var(--text); }
  .mini-stat-value.gain { color: var(--gain); }
  .mini-stat-value.loss { color: var(--loss); }

  /* ── Chart ── */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px 28px 24px;
  }

  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .chart-title { font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }

  .chart-legend { display: flex; gap: 16px; }

  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.65rem; letter-spacing: 0.06em; color: var(--muted); }

  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .chart-wrap { position: relative; height: 240px; }

  footer {
    margin-top: 48px;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-align: center;
    opacity: 0.5;
  }

  @media (max-width: 560px) {
    .ticker-row-inputs, .bottom-row, .compare-grid { grid-template-columns: 1fr; }
    .card { padding: 28px 20px; }
    .result-card { padding: 22px 18px; }
    .chart-card { padding: 20px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Historical Return Calculator</div>
  <h1>What would it be<br>worth <em>today?</em></h1>
  <p class="subtitle">Compare two investments over the same period.</p>
</header>

<div class="card">
  <div class="ticker-row-inputs">
    <div class="field ticker-a">
      <label>Ticker A</label>
      <div class="autocomplete-wrap">
        <input type="text" id="tickerA" placeholder="AAPL" maxlength="10"
               autocomplete="off" autocorrect="off" spellcheck="false"
               oninput="onTickerInput('A', this.value)"
               onkeydown="onTickerKeydown('A', event)"
               onblur="hideDropdownDelayed('A')">
      </div>
    </div>
    <div class="field ticker-b">
      <label>Ticker B</label>
      <div class="autocomplete-wrap">
        <input type="text" id="tickerB" placeholder="SPY" maxlength="10"
               autocomplete="off" autocorrect="off" spellcheck="false"
               oninput="onTickerInput('B', this.value)"
               onkeydown="onTickerKeydown('B', event)"
               onblur="hideDropdownDelayed('B')">
      </div>
    </div>
  </div>

  <div class="divider">same investment &mdash; same period</div>

  <div class="bottom-row">
    <div class="field">
      <label>Investment Date</label>
      <input type="date" id="startDate">
    </div>
    <div class="field">
      <label>Amount (USD)</label>
      <input type="number" id="amount" placeholder="10000" min="1" step="any">
    </div>
  </div>

  <button id="calcBtn" onclick="calculate()">Compare Returns</button>
</div>

<div class="loading-text" id="loadingText">Fetching price data&hellip;</div>
<div id="status"></div>
<div id="result"></div>

<footer>Data provided by Yahoo Finance &bull; Past performance does not indicate future results</footer>

<script>
let growthChart = null;

function fmt(n) {
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtDate(dateStr) {
  const [y, m, d] = dateStr.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
}
function fmtShort(dateStr) {
  const [y, m] = dateStr.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} '${y.slice(2)}`;
}

function setStatus(msg) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}
function setLoading(on) {
  document.getElementById('loadingText').style.display = on ? 'block' : 'none';
  document.getElementById('calcBtn').disabled = on;
  document.getElementById('calcBtn').textContent = on ? 'Fetching data...' : 'Compare Returns';
}

// ── Ticker list ──
const TICKERS = [

const ddState = {
  A: { items: [], activeIndex: -1 },
  B: { items: [], activeIndex: -1 },
};

function onTickerInput(slot, val) {
  const q = val.trim().toUpperCase();
  if (q.length < 2) { hideDropdown(slot); return; }
  const matches = TICKERS.filter(t => t.s.startsWith(q) || t.n.toUpperCase().includes(q)).slice(0, 8);
  ddState[slot].items = matches;
  ddState[slot].activeIndex = -1;
  const dd = document.getElementById('dropdown' + slot);
  positionDropdown(slot);
  if (matches.length === 0) {
    dd.innerHTML = '<div class="dropdown-msg">No matches &mdash; type the full symbol</div>';
  } else {
    dd.innerHTML = matches.map((m, i) => `
      <div class="dropdown-item" data-index="${i}" onmousedown="selectTicker('${slot}', ${i})">
        <span class="dropdown-symbol">${m.s}</span>
        <span class="dropdown-name">${m.n}</span>
        <span class="dropdown-type">${m.t}</span>
      </div>`).join('');
  }
  dd.style.display = 'block';
}

function positionDropdown(slot) {
  const input = document.getElementById('ticker' + slot);
  const dd = document.getElementById('dropdown' + slot);
  const rect = input.getBoundingClientRect();
  dd.style.top = (rect.bottom + 4) + 'px';
  dd.style.left = rect.left + 'px';
  dd.style.width = rect.width + 'px';
}

function selectTicker(slot, index) {
  const item = ddState[slot].items[index];
  if (!item) return;
  document.getElementById('ticker' + slot).value = item.s;
  hideDropdown(slot);
  if (slot === 'A') document.getElementById('tickerB').focus();
  else document.getElementById('startDate').focus();
}

function hideDropdown(slot) {
  document.getElementById('dropdown' + slot).style.display = 'none';
  ddState[slot].items = [];
  ddState[slot].activeIndex = -1;
}

function hideDropdownDelayed(slot) {
  setTimeout(() => hideDropdown(slot), 200);
}

function onTickerKeydown(slot, e) {
  const dd = document.getElementById('dropdown' + slot);
  if (dd.style.display === 'none') return;
  const items = dd.querySelectorAll('.dropdown-item');
  const state = ddState[slot];
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    state.activeIndex = Math.min(state.activeIndex + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    state.activeIndex = Math.max(state.activeIndex - 1, -1);
  } else if (e.key === 'Enter') {
    if (state.activeIndex >= 0) { e.preventDefault(); selectTicker(slot, state.activeIndex); }
    else { hideDropdown(slot); }
    return;
  } else if (e.key === 'Escape') {
    hideDropdown(slot); return;
  }
  items.forEach((el, i) => el.classList.toggle('active', i === state.activeIndex));
}

window.addEventListener('scroll', () => {
  ['A','B'].forEach(s => {
    if (document.getElementById('dropdown' + s).style.display !== 'none') positionDropdown(s);
  });
}, true);
window.addEventListener('resize', () => {
  ['A','B'].forEach(s => {
    if (document.getElementById('dropdown' + s).style.display !== 'none') positionDropdown(s);
  });
});

// ── API — Yahoo Finance (no key, no rate limit) ──

// Returns a map of { 'YYYY-MM-DD': adjustedClose } for monthly data
async function fetchMonthly(ticker) {
  // Use 20yr range, 1mo interval
  const url = `/api/yahoo?ticker=${encodeURIComponent(ticker)}&interval=1mo&range=20y`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`"${ticker}" not found or network error.`);
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data; // { 'YYYY-MM-DD': price, ... }
}

// Returns most recent trading day price and date
async function fetchLatest(ticker) {
  const url = `/api/yahoo?ticker=${encodeURIComponent(ticker)}&interval=1d&range=5d`;
  const resp = await fetch(url);
  if (!resp.ok) return null;
  const data = await resp.json();
  if (data.error || !Object.keys(data).length) return null;
  const dates = Object.keys(data).sort();
  const lastDate = dates[dates.length - 1];
  return { date: lastDate, price: data[lastDate] };
}

function lastKey(obj) { return Object.keys(obj).sort().pop(); }

function alignSeries(seriesMap, dates) {
  const result = [];
  let last = null;
  for (const d of dates) {
    if (seriesMap[d] !== undefined) last = seriesMap[d];
    result.push(last);
  }
  return result;
}

// ── Calculate ──
async function calculate() {
  const tA = document.getElementById('tickerA').value.trim().toUpperCase();
  const tB = document.getElementById('tickerB').value.trim().toUpperCase();
  const startDate = document.getElementById('startDate').value;
  const amount = parseFloat(document.getElementById('amount').value);

  document.getElementById('result').style.display = 'none';
  setStatus('');

  if (!tA) { setStatus('Please enter Ticker A.'); return; }
  if (!tB) { setStatus('Please enter Ticker B.'); return; }
  if (!startDate) { setStatus('Please select a start date.'); return; }
  if (!amount || amount <= 0) { setStatus('Please enter a valid amount.'); return; }

  const today = new Date().toISOString().split('T')[0];
  if (startDate >= today) { setStatus('Start date must be in the past.'); return; }

  const minDate = new Date();
  minDate.setFullYear(minDate.getFullYear() - 20);
  if (startDate < minDate.toISOString().split('T')[0]) {
    setStatus('Date range too far back (20 year max on free tier).'); return;
  }

  setLoading(true);

  try {
    const [monthlyA, monthlyB] = await Promise.all([fetchMonthly(tA), fetchMonthly(tB)]);

    function resolveStart(monthly, sd) {
      const keys = Object.keys(monthly).sort();
      for (const k of keys) { if (k >= sd) return k; }
      return null;
    }

    const startA = resolveStart(monthlyA, startDate);
    const startB = resolveStart(monthlyB, startDate);
    if (!startA) throw new Error(`No data for ${tA} at or after your start date.`);
    if (!startB) throw new Error(`No data for ${tB} at or after your start date.`);

    const sharedStart = startA > startB ? startA : startB;

    const endA = lastKey(monthlyA);
    const endB = lastKey(monthlyB);
    const sharedEnd = endA > endB ? endA : endB;

    const buyA = monthlyA[sharedStart];
    const buyB = monthlyB[sharedStart];

    // Get latest price
    let curA = monthlyA[endA], curDateA = endA;
    let curB = monthlyB[endB], curDateB = endB;
    try {
      const [latA, latB] = await Promise.all([fetchLatest(tA), fetchLatest(tB)]);
      if (latA) { curDateA = latA.date; curA = latA.price; }
      if (latB) { curDateB = latB.date; curB = latB.price; }
    } catch(e) { /* monthly fallback */ }

    // Build portfolio value maps for chart
    function buildMap(monthly, start, end, amt, buy) {
      const keys = Object.keys(monthly).sort().filter(d => d >= start && d <= end);
      const map = {};
      keys.forEach(d => { map[d] = (amt / buy) * monthly[d]; });
      return map;
    }

    const mapA = buildMap(monthlyA, sharedStart, sharedEnd, amount, buyA);
    const mapB = buildMap(monthlyB, sharedStart, sharedEnd, amount, buyB);

    const allDates = [...new Set([...Object.keys(mapA), ...Object.keys(mapB)])].sort();
    const valuesA = alignSeries(mapA, allDates);
    const valuesB = alignSeries(mapB, allDates);

    // Final stats
    const finalA = (amount / buyA) * curA;
    const finalB = (amount / buyB) * curB;
    const gainA = finalA - amount, gainB = finalB - amount;
    const pctA = (gainA / amount) * 100, pctB = (gainB / amount) * 100;
    const yearsA = (new Date(curDateA) - new Date(sharedStart)) / (1000*60*60*24*365.25);
    const yearsB = (new Date(curDateB) - new Date(sharedStart)) / (1000*60*60*24*365.25);
    const cagrA = yearsA > 0 ? (Math.pow(finalA/amount, 1/yearsA) - 1)*100 : 0;
    const cagrB = yearsB > 0 ? (Math.pow(finalB/amount, 1/yearsB) - 1)*100 : 0;
    const winnerIsA = finalA >= finalB;

    function cardHTML(ticker, slot, startKey, curDate, curPrice, buyPrice, finalVal, gain, pct, cagr, isWinner) {
      const isGain = gain >= 0;
      const sign = isGain ? '+' : '';
      const cls = isGain ? 'gain' : 'loss';
      return `
        <div class="result-card card-${slot.toLowerCase()}">
          ${isWinner ? '<div class="winner-badge">&#9650; Winner</div>' : '<div style="height:21px;margin-bottom:10px"></div>'}
          <div class="rc-ticker">${ticker}</div>
          <div class="rc-dates">${fmtDate(startKey)} &rarr; ${fmtDate(curDate)}</div>
          <div class="rc-present">$${fmt(finalVal)}</div>
          <div class="rc-invested">from $${fmt(amount)} invested</div>
          <div class="rc-return ${cls}">${sign}$${fmt(Math.abs(gain))}</div>
          <div class="rc-pct ${cls}">${sign}${fmt(Math.abs(pct))}%</div>
          <div class="mini-stats">
            <div class="mini-stat">
              <div class="mini-stat-label">Ann. Return</div>
              <div class="mini-stat-value ${cls}">${sign}${fmt(Math.abs(cagr))}%</div>
            </div>
            <div class="mini-stat">
              <div class="mini-stat-label">Multiplier</div>
              <div class="mini-stat-value">${(finalVal/amount).toFixed(2)}x</div>
            </div>
            <div class="mini-stat">
              <div class="mini-stat-label">Buy Price</div>
              <div class="mini-stat-value">$${fmt(buyPrice)}</div>
            </div>
            <div class="mini-stat">
              <div class="mini-stat-label">Cur. Price</div>
              <div class="mini-stat-value">$${fmt(curPrice)}</div>
            </div>
          </div>
        </div>`;
    }

    // Thin chart labels
    const step = Math.max(1, Math.floor(allDates.length / 10));
    const chartLabels = allDates.map((d, i) =>
      (i % step === 0 || i === allDates.length - 1) ? fmtShort(d) : '');

    document.getElementById('result').innerHTML = `
      <div class="compare-grid">
        ${cardHTML(tA, 'A', sharedStart, curDateA, curA, buyA, finalA, gainA, pctA, cagrA, winnerIsA)}
        ${cardHTML(tB, 'B', sharedStart, curDateB, curB, buyB, finalB, gainB, pctB, cagrB, !winnerIsA)}
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title">Portfolio Value Over Time</span>
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background:#b8ff57"></div>${tA}</div>
            <div class="legend-item"><div class="legend-dot" style="background:#57c8ff"></div>${tB}</div>
          </div>
        </div>
        <div class="chart-wrap"><canvas id="growthChart"></canvas></div>
      </div>`;

    document.getElementById('result').style.display = 'block';

    if (growthChart) { growthChart.destroy(); growthChart = null; }

    growthChart = new Chart(document.getElementById('growthChart').getContext('2d'), {
      type: 'line',
      data: {
        labels: chartLabels,
        datasets: [
          {
            label: tA,
            data: valuesA,
            borderColor: '#b8ff57',
            backgroundColor: 'rgba(184,255,87,0.05)',
            borderWidth: 2,
            pointRadius: 0,
            tension: 0.3,
            fill: true,
          },
          {
            label: tB,
            data: valuesB,
            borderColor: '#57c8ff',
            backgroundColor: 'rgba(87,200,255,0.05)',
            borderWidth: 2,
            pointRadius: 0,
            tension: 0.3,
            fill: true,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1f1a',
            borderColor: '#2a302a',
            borderWidth: 1,
            titleColor: '#5a635a',
            bodyColor: '#e8ede8',
            titleFont: { family: "'DM Mono', monospace", size: 11 },
            bodyFont: { family: "'DM Mono', monospace", size: 12 },
            padding: 12,
            callbacks: {
              title: (items) => allDates[items[0].dataIndex] ? fmtDate(allDates[items[0].dataIndex]) : '',
              label: (item) => ` ${item.dataset.label}   $${fmt(item.raw)}`
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.03)' },
            ticks: { color: '#5a635a', font: { family: "'DM Mono', monospace", size: 10 }, maxRotation: 0 },
            border: { color: '#1e221e' }
          },
          y: {
            grid: { color: 'rgba(255,255,255,0.04)' },
            ticks: {
              color: '#5a635a',
              font: { family: "'DM Mono', monospace", size: 10 },
              callback: v => '$' + (v >= 1000 ? (v/1000).toFixed(0)+'k' : fmt(v))
            },
            border: { color: '#1e221e' }
          }
        }
      }
    });

  } catch(err) {
    setStatus(err.message || 'Something went wrong. Please try again.');
  } finally {
    setLoading(false);
  }
}

document.addEventListener('keydown', e => {
  const id = document.activeElement.id;
  if (e.key === 'Enter' && id !== 'tickerA' && id !== 'tickerB') calculate();
});

// Inject dropdowns into body
['A','B'].forEach(slot => {
  const dd = document.createElement('div');
  dd.id = 'dropdown' + slot;
  dd.className = 'ticker-dropdown';
  document.body.appendChild(dd);
});

document.getElementById('startDate').value = _d.toISOString().split('T')[0];
document.getElementById('startDate').max = new Date().toISOString().split('T')[0];
</script>
