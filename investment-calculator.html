<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141714;
    --border: #1e221e;
    --border-bright: #2a302a;
    --text: #e8ede8;
    --muted: #5a635a;
    --accent: #b8ff57;
    --accent-dim: #8ab83e;
    --gain: #b8ff57;
    --loss: #ff6b57;
    --loss-dim: #c45242;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-mono: 'DM Mono', 'Courier New', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 24px;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(184,255,87,0.06) 0%, transparent 70%);
  }

  header {
    text-align: center;
    margin-bottom: 56px;
  }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(2.4rem, 5vw, 3.8rem);
    font-weight: 400;
    line-height: 1.1;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    margin-top: 14px;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .card {
    width: 100%;
    max-width: 580px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 40px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 4px;
    background: linear-gradient(135deg, rgba(184,255,87,0.12), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .card > * { position: relative; z-index: 1; }

  .field {
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 1.05rem;
    font-weight: 400;
    padding: 13px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(184,255,87,0.08);
  }

  input::placeholder { color: var(--muted); opacity: 0.6; }

  input[type="text"] { text-transform: uppercase; }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  button {
    width: 100%;
    background: var(--accent);
    color: #0a0c0a;
    border: none;
    border-radius: 3px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 16px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 8px;
  }

  button:hover { background: #c9ff6e; }
  button:active { transform: scale(0.99); }
  button:disabled { background: var(--border-bright); color: var(--muted); cursor: not-allowed; }

  /* Result panel */
  #result {
    width: 100%;
    max-width: 580px;
    margin-top: 16px;
    display: none;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px 40px;
    position: relative;
    overflow: hidden;
  }

  .result-card.gain { border-color: rgba(184,255,87,0.25); }
  .result-card.loss { border-color: rgba(255,107,87,0.25); }

  .result-card.gain::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top left, rgba(184,255,87,0.05), transparent 60%);
    pointer-events: none;
  }

  .result-card.loss::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top left, rgba(255,107,87,0.05), transparent 60%);
    pointer-events: none;
  }

  .ticker-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .ticker-badge {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .date-range {
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .big-number {
    font-family: var(--font-display);
    font-size: clamp(2.6rem, 7vw, 4rem);
    line-height: 1;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .big-number.gain { color: var(--gain); }
  .big-number.loss { color: var(--loss); }

  .current-value {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-bottom: 32px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .stat {
    background: var(--bg);
    padding: 16px 18px;
  }

  .stat-label {
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
  }

  .stat-value.gain { color: var(--gain); }
  .stat-value.loss { color: var(--loss); }

  /* Error / status */
  #status {
    width: 100%;
    max-width: 580px;
    margin-top: 16px;
    display: none;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    color: var(--loss);
    padding: 16px 20px;
    background: rgba(255,107,87,0.06);
    border: 1px solid rgba(255,107,87,0.2);
    border-radius: 3px;
  }

  .loading-text {
    color: var(--muted);
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-align: center;
    padding: 20px 0;
    display: none;
  }

  footer {
    margin-top: 48px;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-align: center;
    opacity: 0.5;
  }

  @media (max-width: 480px) {
    .card, .result-card { padding: 28px 24px; }
    .row { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr; }
    .ticker-row { flex-direction: column; align-items: flex-start; gap: 4px; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Historical Return Calculator</div>
  <h1>What would it be<br>worth <em>today?</em></h1>
  <p class="subtitle">Enter a ticker, a date, and an amount &mdash; the rest is math.</p>
</header>

<div class="card">
  <div class="field">
    <label>Ticker / Symbol</label>
    <input type="text" id="ticker" placeholder="AAPL, SPY, MSFT..." maxlength="10" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>
  <div class="row">
    <div class="field">
      <label>Investment Date</label>
      <input type="date" id="startDate">
    </div>
    <div class="field">
      <label>Amount (USD)</label>
      <input type="number" id="amount" placeholder="10000" min="1" step="any">
    </div>
  </div>
  <button id="calcBtn" onclick="calculate()">Calculate Return</button>
</div>

<div class="loading-text" id="loadingText">Fetching price data&hellip;</div>
<div id="status"></div>
<div id="result"></div>

<footer>Data provided by Alpha Vantage &bull; Past performance does not indicate future results</footer>

<script>
const API_KEY = 'LS6NMT89KF6VCU0X';

function fmt(n) {
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(dateStr) {
  const [y, m, d] = dateStr.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
}

function setStatus(msg) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function setLoading(on) {
  document.getElementById('loadingText').style.display = on ? 'block' : 'none';
  document.getElementById('calcBtn').disabled = on;
  document.getElementById('calcBtn').textContent = on ? 'Fetching data...' : 'Calculate Return';
}

async function fetchMonthlyPrices(ticker) {
  const url = `https://www.alphavantage.co/query?function=TIME_SERIES_MONTHLY_ADJUSTED&symbol=${ticker}&apikey=${API_KEY}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('Network error fetching price data.');
  const data = await resp.json();

  if (data['Information']) throw new Error('API rate limit reached. Alpha Vantage free tier allows 25 requests/day. Please wait a moment.');
  if (data['Error Message']) throw new Error(`Symbol "${ticker}" not found. Check the ticker and try again.`);
  if (!data['Monthly Adjusted Time Series']) throw new Error('Unexpected API response. The symbol may be invalid.');

  return data['Monthly Adjusted Time Series'];
}

async function fetchDailyPrices(ticker) {
  const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY_ADJUSTED&symbol=${ticker}&outputsize=compact&apikey=${API_KEY}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('Network error.');
  const data = await resp.json();
  if (data['Information']) throw new Error('API rate limit reached. Alpha Vantage free tier allows 25 requests/day. Please wait a moment.');
  if (!data['Time Series (Daily)']) return null;
  return data['Time Series (Daily)'];
}

function findClosestDate(series, targetDate) {
  // series is an object keyed by date string YYYY-MM-DD
  const dates = Object.keys(series).sort();
  // Find first date >= targetDate
  let found = null;
  for (const d of dates) {
    if (d >= targetDate) { found = d; break; }
  }
  // If none found forward, use last available
  if (!found) found = dates[dates.length - 1];
  return found;
}

function getMostRecentDate(series) {
  const dates = Object.keys(series).sort();
  return dates[dates.length - 1];
}

async function calculate() {
  const ticker = document.getElementById('ticker').value.trim().toUpperCase();
  const startDate = document.getElementById('startDate').value;
  const amount = parseFloat(document.getElementById('amount').value);

  document.getElementById('result').style.display = 'none';
  setStatus('');

  if (!ticker) { setStatus('Please enter a ticker symbol.'); return; }
  if (!startDate) { setStatus('Please select a start date.'); return; }
  if (!amount || amount <= 0) { setStatus('Please enter a valid investment amount.'); return; }

  const today = new Date().toISOString().split('T')[0];
  if (startDate >= today) { setStatus('Start date must be in the past.'); return; }

  const minDate = new Date();
  minDate.setFullYear(minDate.getFullYear() - 20);
  const minDateStr = minDate.toISOString().split('T')[0];
  if (startDate < minDateStr) { setStatus('Date range too far back. Alpha Vantage free tier returns up to 20 years of monthly data.'); return; }

  setLoading(true);

  try {
    // Fetch monthly data for historical price
    const monthly = await fetchMonthlyPrices(ticker);

    // Get monthly close for start date
    // Alpha Vantage monthly keys are end-of-month dates
    // Find the month matching or just after the start date
    const monthDates = Object.keys(monthly).sort();

    // Determine start month key: first month-end >= startDate
    let startKey = null;
    for (const d of monthDates) {
      if (d >= startDate) { startKey = d; break; }
    }
    if (!startKey) throw new Error('No price data available for or after your start date. The stock may not have existed then.');

    const endKey = getMostRecentDate(monthly);
    const buyPrice = parseFloat(monthly[startKey]['4. close']);
    const currentPrice = parseFloat(monthly[endKey]['4. close']);

    if (!buyPrice || !currentPrice) throw new Error('Price data unavailable for this symbol.');

    // Try to get more precise current price from daily
    let preciseCurrent = currentPrice;
    let preciseCurrentDate = endKey;
    try {
      const daily = await fetchDailyPrices(ticker);
      if (daily) {
        preciseCurrentDate = getMostRecentDate(daily);
        preciseCurrent = parseFloat(daily[preciseCurrentDate]['4. close']);
      }
    } catch (e) {
      // daily failed, use monthly — no problem
    }

    const shares = amount / buyPrice;
    const currentValue = shares * preciseCurrent;
    const gainLoss = currentValue - amount;
    const pct = ((currentValue - amount) / amount) * 100;
    const isGain = gainLoss >= 0;

    // Years held
    const ms = new Date(preciseCurrentDate) - new Date(startKey);
    const years = ms / (1000 * 60 * 60 * 24 * 365.25);
    const cagr = years > 0 ? (Math.pow(currentValue / amount, 1 / years) - 1) * 100 : 0;

    // Render
    const sign = isGain ? '+' : '';
    const cls = isGain ? 'gain' : 'loss';

    document.getElementById('result').innerHTML = `
      <div class="result-card ${cls}">
        <div class="ticker-row">
          <span class="ticker-badge">${ticker}</span>
          <span class="date-range">${fmtDate(startKey)} &rarr; ${fmtDate(preciseCurrentDate)}</span>
        </div>
        <div class="big-number ${cls}">${sign}$${fmt(Math.abs(gainLoss))}</div>
        <div class="current-value">Current value: $${fmt(currentValue)} &nbsp;&middot;&nbsp; Invested: $${fmt(amount)}</div>
        <div class="stats-grid">
          <div class="stat">
            <div class="stat-label">Return</div>
            <div class="stat-value ${cls}">${sign}${fmt(Math.abs(pct))}%</div>
          </div>
          <div class="stat">
            <div class="stat-label">Buy Price</div>
            <div class="stat-value">$${fmt(buyPrice)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Current Price</div>
            <div class="stat-value">$${fmt(preciseCurrent)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Shares</div>
            <div class="stat-value">${fmt(shares)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Years Held</div>
            <div class="stat-value">${years.toFixed(1)}</div>
          </div>
          <div class="stat">
            <div class="stat-label">Ann. Return</div>
            <div class="stat-value ${cls}">${sign}${fmt(Math.abs(cagr))}%</div>
          </div>
        </div>
      </div>
    `;
    document.getElementById('result').style.display = 'block';

  } catch (err) {
    setStatus(err.message || 'Something went wrong. Please try again.');
  } finally {
    setLoading(false);
  }
}

// Allow Enter key to trigger
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') calculate();
});

// Default date: 5 years ago
const d = new Date();
d.setFullYear(d.getFullYear() - 5);
document.getElementById('startDate').value = d.toISOString().split('T')[0];
document.getElementById('startDate').max = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
